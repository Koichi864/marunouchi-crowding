<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>丸の内 混雑マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ── ヘッダー ── -->
  <header id="app-header">
    <div class="header-inner">
      <h1 id="app-title">🍴 丸の内 混雑マップ</h1>
      <div class="header-right">
        <span id="update-badge">--:--</span>
        <button id="refresh-btn" aria-label="データ更新">↺</button>
      </div>
    </div>
  </header>

  <!-- ── 地図 ── -->
  <div id="map"></div>

  <!-- ── 凡例（地図上フローティング） ── -->
  <div id="legend">
    <div class="legend-title">混雑度</div>
    <div class="legend-row"><span class="leg-dot level-empty"></span>空いている</div>
    <div class="legend-row"><span class="leg-dot level-quiet"></span>やや空き</div>
    <div class="legend-row"><span class="leg-dot level-normal"></span>普通</div>
    <div class="legend-row"><span class="leg-dot level-busy"></span>混雑</div>
    <div class="legend-row"><span class="leg-dot level-very_busy"></span>激混み</div>
    <div class="legend-note">※時間帯予測</div>
  </div>

  <!-- ── ボトムシート ── -->
  <div id="bottom-sheet">
    <!-- ドラッグハンドル -->
    <div id="sheet-handle">
      <div id="handle-bar"></div>
    </div>

    <!-- リスト表示 -->
    <div id="sheet-content">
      <div id="filter-bar">
        <input id="search-input" type="search" placeholder="店名・ジャンルで検索..." autocomplete="off" />

        <div class="filter-group-label">📍 エリア</div>
        <div class="filter-scroll" id="area-filters">
          <button class="area-btn active" data-area="all">全エリア</button>
          <button class="area-btn" data-area="丸の内">丸の内</button>
          <button class="area-btn" data-area="大手町">大手町</button>
          <button class="area-btn" data-area="八重洲">八重洲</button>
          <button class="area-btn" data-area="有楽町">有楽町</button>
          <button class="area-btn" data-area="日比谷">日比谷</button>
          <button class="area-btn" data-area="霞が関">霞が関</button>
          <button class="area-btn" data-area="新橋">新橋</button>
        </div>

        <div class="filter-group-label">🍴 ジャンル</div>
        <div class="filter-scroll" id="type-filters">
          <button class="filter-btn active" data-type="all">すべて</button>
          <button class="filter-btn" data-type="restaurant">レストラン</button>
          <button class="filter-btn" data-type="cafe">カフェ</button>
          <button class="filter-btn" data-type="fast_food">ファストフード</button>
          <button class="filter-btn" data-type="bakery">ベーカリー</button>
          <button class="filter-btn" data-type="bar">バー・パブ</button>
        </div>

        <div class="filter-group-label">🔴 混雑度</div>
        <div class="filter-scroll" id="crowd-filters">
          <button class="crowd-btn active" data-crowd="all">すべて</button>
          <button class="crowd-btn" data-crowd="empty">空いている</button>
          <button class="crowd-btn" data-crowd="quiet">やや空き</button>
          <button class="crowd-btn" data-crowd="normal">普通</button>
          <button class="crowd-btn" data-crowd="busy">混雑</button>
          <button class="crowd-btn" data-crowd="very_busy">激混み</button>
        </div>
      </div>

      <div id="list-count">読み込み中...</div>
      <ul id="restaurant-list"></ul>
    </div>

    <!-- 詳細表示 -->
    <div id="detail-view" class="hidden">
      <div id="detail-header">
        <button id="back-btn">← 一覧に戻る</button>
      </div>
      <div id="detail-scroll">
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <!-- ── ローディング ── -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">読み込み中...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
